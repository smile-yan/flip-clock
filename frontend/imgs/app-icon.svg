    <rect x="780" y="455" width="56" height="74" rx="22" fill="#0a0d12"/>
    <rect x="200" y="478" width="32" height="28" rx="12" fill="#222a34"/>
    <rect x="792" y="478" width="32" height="28" rx="12" fill="#222a34"/>

