    <g clip-path="url(#cardClip)">
      <rect x="214" y="236" width="596" height="276" fill="url(#cardTop)"/>
      <rect x="214" y="512" width="596" height="276" fill="url(#cardBottom)"/>
      <rect x="214" y="507" width="596" height="10" fill="#05070a"/>
      <path d="M214 507h596" stroke="#6f7682" stroke-opacity="0.38" stroke-width="2"/>
      <path d="M276 236h448c42 0 76 34 76 76v33H200v-33c0-42 34-76 76-76Z" fill="#ffffff" opacity="0.08"/>
