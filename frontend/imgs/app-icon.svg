<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="flip-clock app icon">
  <defs>
    <linearGradient id="bg" x1="168" y1="112" x2="856" y2="912" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#273241"/>
      <stop offset="0.48" stop-color="#141a22"/>
      <stop offset="1" stop-color="#07090d"/>
    </linearGradient>
    <linearGradient id="cardTop" x1="248" y1="244" x2="776" y2="508" gradientUnits="userSpaceOnUse">
