name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: flip-clock
  RUST_TOOLCHAIN: '1.95.0'

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows
            arch: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: darwin
            arch: aarch64-apple-darwin
          - os: macos-latest
            platform: darwin
            arch: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.arch }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build
        run: |
          cd src-tauri
          cargo tauri build --target ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.arch }}/release/bundle/
          if-no-files-found: error

  package-macos:
    name: Package macOS DMG
    needs: build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-*
          path: bundle

      - name: List downloaded
        run: |
          find bundle -type f | head -20

      - name: Create universal DMG
        run: |
          cd bundle
          # Find DMG files
          ARM64=$(find . -name "*aarch64*.dmg" | head -1)
          AMD64=$(find . -name "*x86_64*.dmg" | head -1)
          echo "Arm64: $ARM64"
          echo "Amd64: $AMD64"

          if [ -z "$ARM64" ] || [ -z "$AMD64" ]; then
            echo "Error: Missing DMG files"
            exit 1
          fi

          # Mount and copy apps
          mkdir -p /tmp/arm64-app /tmp/amd64-app /tmp/universal
          hdiutil attach "$ARM64" -readonly -nobrowse -mountpoint /tmp/arm64-app
          cp -R /tmp/arm64-app/*.app /tmp/universal/
          hdiutil detach /tmp/arm64-app

          hdiutil attach "$AMD64" -readonly -nobrowse -mountpoint /tmp/amd64-app
          APP=$(ls /tmp/amd64-app/*.app 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            cp /tmp/amd64-app/*.app/Contents/MacOS/* /tmp/universal/*.app/Contents/MacOS/ 2>/dev/null || true
            chmod +x /tmp/universal/*.app/Contents/MacOS/*
          fi
          hdiutil detach /tmp/amd64-app

          ln -sf /Applications /tmp/universal/

          # Create DMG
          hdiutil create \
            -volname "Flip Clock" \
            -srcfolder /tmp/universal \
            -ov -format UDZO \
            -fs HFS+ \
            -scrub \
            ../flip-clock-${{ github.ref_name }}-macos-universal.dmg

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.ref_name }}-macos-universal
          path: flip-clock-${{ github.ref_name }}-macos-universal.dmg
          if-no-files-found: error

  release:
    name: Create Release
    needs:
      - build
      - package-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.APP_NAME }}-${{ github.ref_name }}-*
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: |
          echo "=== Assets ==="
          find release-assets -type f -exec ls -lh {} \;

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/*
