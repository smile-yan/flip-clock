name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: flip-clock
  RUST_TOOLCHAIN: '1.95.0'
  NODE_VERSION: '24'

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows
            arch: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: darwin
            arch: aarch64-apple-darwin
          - os: macos-latest
            platform: darwin
            arch: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.arch }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      # Verify the committed icon.ico has matching header width/height on every
      # layer — guards against the regression where a 512-px PNG payload was
      # embedded under a 256-px ICO header, which Windows renders by trusting
      # the header and produces a blurry taskbar icon.
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install pillow

      - name: Verify icon.ico layer sizes
        run: |
          # Write script to a temp file first — required because Windows runners
          # use PowerShell (pwsh) which does not support bash/zsh heredoc syntax.
          python3 -c "
          import os, sys
          script = '''import struct, io, sys
          from PIL import Image
          with open('src-tauri/icons/icon.ico', 'rb') as f:
              data = f.read()
          _, _, count = struct.unpack('<HHH', data[:6])
          bad = []
          sizes = []
          for i in range(count):
              w, _h = struct.unpack('<BB', data[6 + i*16 : 8 + i*16])
              psz, poff = struct.unpack('<II', data[14 + i*16 : 22 + i*16])
              hd = 256 if w == 0 else w
              sizes.append(hd)
              actual = Image.open(io.BytesIO(data[poff:poff+psz])).size
              if actual != (hd, hd):
                  bad.append((i, hd, actual))
          if bad:
              print('ICO header/payload mismatch:', bad, file=sys.stderr)
              sys.exit(1)
          print(f'OK: {count} layers, all header==payload, sizes={sorted(sizes, reverse=True)}')
          '''
          path = os.path.join(os.environ.get('TEMP', '/tmp'), 'verify_ico.py')
          with open(path, 'w') as f:
              f.write(script)
          os.execv(sys.executable, [sys.executable, path])
          "

      - name: Build
        run: |
          cd src-tauri
          cargo tauri build --target ${{ matrix.arch }}

      - name: Rename artifacts to v-tag format
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          cd src-tauri/target/${{ matrix.arch }}/release/bundle
          TAG="${{ github.ref_name }}"   # e.g. v1.0.1 (already includes 'v')
          APP="${{ env.APP_NAME }}"      # e.g. flip-clock
          ARCH="${{ matrix.arch }}"

          # Map arch to a human-friendly triple used in the filename
          case "$ARCH" in
            x86_64-unknown-linux-gnu)  SHORT=linux-x86_64  ;;
            x86_64-pc-windows-msvc)    SHORT=windows-x86_64 ;;
            aarch64-apple-darwin)      SHORT=macos-arm64    ;;
            x86_64-apple-darwin)       SHORT=macos-x86_64   ;;
            *)                         SHORT="$ARCH"        ;;
          esac

          # Tauri default names embed the version from tauri.conf.json, not the
          # git tag. Rewrite each known bundle output to flip-clock-v{tag}-{plat}-{arch}.{ext}.
          # Only touch distributable artifacts at depth ≤ 2 — never recurse into
          # .app bundles (they're directories whose internal layout is fixed by
          # macOS) or inside installers.
          rename_one() {
            local f="$1"
            local dir ext base new
            dir=$(dirname "$f")
            base=$(basename "$f")
            # Detect "extension" by matching known distributable suffixes.
            # Order matters: check compound suffixes before bare ones.
            case "$base" in
              *_x64-setup.exe)  ext="exe"; suffix="-setup" ;;
              *.exe)            ext="exe"; suffix="" ;;
              *.msi)            ext="msi"; suffix="" ;;
              *.AppImage)       ext="AppImage"; suffix="" ;;
              *.deb)            ext="deb"; suffix="" ;;
              *.rpm)            ext="rpm"; suffix="" ;;
              *.dmg)            ext="dmg"; suffix="" ;;
              *.app)            ext="app"; suffix="" ;;
              *)                return 0 ;;  # skip unrelated files
            esac
            new="$APP-$TAG-$SHORT"
            mv "$f" "$dir/$new$suffix.$ext"
          }

          # -maxdepth 2 covers bundle/dmg/*.dmg, bundle/macos/*.app,
          # bundle/nsis/*.exe, bundle/msi/*.msi, etc. — but never the
          # internals of a .app directory.
          while IFS= read -r f; do
            rename_one "$f"
          done < <(find . -maxdepth 2 \( -name '*.dmg' -o -name '*.app' -o -name '*.exe' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \))

          echo "--- after rename ---"
          find . -maxdepth 2 -type f -o -maxdepth 2 -type d -name '*.app'

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.arch }}/release/bundle/
          if-no-files-found: error

  package-macos:
    name: Package macOS DMG
    needs: build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-*
          path: bundle

      - name: List downloaded
        run: |
          find bundle -type f | head -20

      - name: Create universal DMG
        run: |
          cd bundle
          # Find the two per-arch DMG files (renamed by the build job to
          # flip-clock-v{tag}-macos-arm64.dmg / -macos-x86_64.dmg)
          ARM64=$(find . -name "*macos-arm64.dmg" 2>/dev/null | head -1)
          AMD64=$(find . -name "*macos-x86_64.dmg" 2>/dev/null | head -1)
          echo "Listing all DMG files:"
          find . -name "*.dmg" 2>/dev/null
          echo "Arm64: $ARM64"
          echo "Amd64: $AMD64"

          if [ -z "$ARM64" ] || [ -z "$AMD64" ]; then
            echo "Error: Missing DMG files"
            exit 1
          fi

          # Mount and copy apps
          mkdir -p /tmp/arm64-app /tmp/amd64-app /tmp/universal
          hdiutil attach "$ARM64" -readonly -nobrowse -mountpoint /tmp/arm64-app
          cp -R /tmp/arm64-app/*.app /tmp/universal/
          hdiutil detach /tmp/arm64-app

          hdiutil attach "$AMD64" -readonly -nobrowse -mountpoint /tmp/amd64-app
          APP=$(ls /tmp/amd64-app/*.app 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            cp /tmp/amd64-app/*.app/Contents/MacOS/* /tmp/universal/*.app/Contents/MacOS/ 2>/dev/null || true
            chmod +x /tmp/universal/*.app/Contents/MacOS/*
          fi
          hdiutil detach /tmp/amd64-app

          ln -sf /Applications /tmp/universal/

          # Create DMG (APFS, no HFS+/scrub — those legacy flags trip the
          # macOS 26 runner with `hdiutil: create failed - Resource busy`.)
          hdiutil create \
            -volname "Flip Clock" \
            -srcfolder /tmp/universal \
            -ov -format UDZO \
            ../flip-clock-${{ github.ref_name }}-macos-universal.dmg

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}-${{ github.ref_name }}-macos-universal
          path: flip-clock-${{ github.ref_name }}-macos-universal.dmg
          if-no-files-found: error

  release:
    name: Create Release
    needs:
      - build
      - package-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ env.APP_NAME }}-${{ github.ref_name }}-*
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: |
          echo "=== Assets ==="
          find release-assets -type f -exec ls -lh {} \;

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            release-assets/nsis/*.exe
            release-assets/deb/*.deb
            release-assets/rpm/*.rpm
            release-assets/msi/*.msi
            release-assets/*.dmg
