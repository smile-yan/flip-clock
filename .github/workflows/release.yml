name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: flip-clock
  RUST_TOOLCHAIN: '1.95.0'

jobs:
  # ==================== Desktop Builds ====================
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows
            arch: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: darwin
            arch: aarch64-apple-darwin
          - os: macos-latest
            platform: darwin
            arch: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.arch }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build
        run: |
          cd src-tauri
          cargo tauri build --target ${{ matrix.arch }}

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          # Get absolute paths
          WORK_DIR="$PWD"
          cd src-tauri
          SRC_DIR="$PWD"
          OUT_DIR="${SRC_DIR}/dist/${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "${OUT_DIR}"

          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            cp "${SRC_DIR}/target/x86_64-pc-windows-msvc/release/bundle/nsis"/*.exe "${OUT_DIR}/" 2>/dev/null || true
          elif [[ "${{ matrix.platform }}" == "darwin" ]]; then
            cp "${SRC_DIR}/target/${{ matrix.arch }}/release/bundle/dmg"/*.dmg "${OUT_DIR}/" 2>/dev/null || true
          else
            # Linux: copy all bundle formats
            cp "${SRC_DIR}/target/${{ matrix.arch }}/release/bundle"/*/*.AppImage "${OUT_DIR}/" 2>/dev/null || true
            cp "${SRC_DIR}/target/${{ matrix.arch }}/release/bundle/deb"/*.deb "${OUT_DIR}/" 2>/dev/null || true
            cp "${SRC_DIR}/target/${{ matrix.arch }}/release/bundle/rpm"/*.rpm "${OUT_DIR}/" 2>/dev/null || true
            cp "${SRC_DIR}/target/${{ matrix.arch }}/release/${APP_NAME}" "${OUT_DIR}/" 2>/dev/null || true
          fi
          ls -la "${OUT_DIR}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: src-tauri/dist/${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}/
          if-no-files-found: error

  # ==================== macOS Universal DMG ====================
  package-macos:
    name: Package macOS Universal DMG
    needs: build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-*
          path: src-tauri/dist

      - name: Create universal DMG
        shell: bash
        run: |
          set -euo pipefail
          cd src-tauri
          arm64_dmg=$(find dist -name "*darwin-aarch64*.dmg" | head -1)
          amd64_dmg=$(find dist -name "*darwin-x86_64*.dmg" | head -1)

          echo "Arm64 DMG: ${arm64_dmg}"
          echo "Amd64 DMG: ${amd64_dmg}"

          if [[ -z "${arm64_dmg}" ]] || [[ -z "${amd64_dmg}" ]]; then
            echo "Error: Missing DMG files"
            ls -la src-tauri/dist/
            exit 1
          fi

          # Mount and merge
          volume_dir="/tmp/${APP_NAME}-volume"
          rm -rf "${volume_dir}"
          mkdir -p "${volume_dir}"

          # Mount arm64
          mnt1="/tmp/mnt1"
          mkdir -p "${mnt1}"
          hdiutil attach "${arm64_dmg}" -readonly -nobrowse -mountpoint "${mnt1}" 2>/dev/null || true
          if [ -d "${mnt1}/"*.app ]; then
            cp -R "${mnt1}/"*.app "${volume_dir}/"
          fi
          hdiutil detach "${mnt1}" 2>/dev/null || true

          # Mount x86_64
          mnt2="/tmp/mnt2"
          mkdir -p "${mnt2}"
          hdiutil attach "${amd64_dmg}" -readonly -nobrowse -mountpoint "${mnt2}" 2>/dev/null || true
          x86_app=$(ls "${mnt2}/"*.app 2>/dev/null | head -1 || echo "")
          hdiutil detach "${mnt2}" 2>/dev/null || true

          if [[ -n "${x86_app}" ]] && [[ -d "${volume_dir}/"*.app ]]; then
            app_name=$(basename "${x86_app}")
            mkdir -p "${volume_dir}/${app_name}/Contents/MacOS"
            cp "${x86_app}/Contents/MacOS/"* "${volume_dir}/${app_name}/Contents/MacOS/" 2>/dev/null || true
            chmod +x "${volume_dir}/${app_name}/Contents/MacOS/"*
          fi

          ln -s /Applications "${volume_dir}/Applications"

          # Create DMG
          dmg_output="dist/${APP_NAME}-${GITHUB_REF_NAME}-darwin-universal/${APP_NAME}-${GITHUB_REF_NAME}-macos-universal.dmg"
          mkdir -p "dist/${APP_NAME}-${GITHUB_REF_NAME}-darwin-universal"

          hdiutil create \
            -volname "Flip Clock" \
            -srcfolder "${volume_dir}" \
            -ov -format UDZO \
            -fs HFS+ -scrub \
            "${dmg_output}"

          echo "Verifying DMG..."
          hdiutil verify "${dmg_output}"
          shasum -a 256 "${dmg_output}"

      - name: Upload macOS package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-universal
          path: src-tauri/dist/${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-universal/${{ env.APP_NAME }}-${{ github.ref_name }}-macos-universal.dmg
          if-no-files-found: error

  # ==================== Create Release ====================
  release:
    name: Create GitHub Release
    needs:
      - build
      - package-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.APP_NAME }}-${{ github.ref_name }}-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: |
          echo "=== All artifacts ==="
          find release-assets -type f | while read f; do
            echo "$f"
            ls -lh "$f"
          done

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/*
