name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: '1.95.0'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@${{ env.RUST_TOOLCHAIN }}

      - name: Check formatting
        run: |
          rustfmt --check src-tauri/src/**/*.rs || true
          cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: |
          rustup component add clippy
          cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@${{ env.RUST_TOOLCHAIN }}

      - name: Run tests
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml

  build-check:
    name: Build Check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows
            arch: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: darwin
            arch: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@${{ env.RUST_TOOLCHAIN }}
        with:
          targets: ${{ matrix.arch }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build
        run: |
          cargo build --manifest-path src-tauri/Cargo.toml --target ${{ matrix.arch }}
